<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="banner">
        <div class="trim"><img src="https://media.cntraveler.com/photos/5eb18e42fc043ed5d9779733/16:9/w_1280%2Cc_limit/BlackForest-Germany-GettyImages-147180370.jpg" alt="view"></div>
    </div>
    <form class="signup">
    <fieldset>
        <legend>Join Today!</legend>
        <div class="rowt">
        <div class="box">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        </div>
        <div class="box">
        <label for="surname">Surname:</label>
        <input type="text" id="surname" name="surname">
        </div>
        </div>
        <div class="rowt">
        <div class="box">
        <label for="usermail">Mail:</label>
        <input type="email" id="usermail" name="usermail">
        </div>
        <div class="box">
        <label for="phonenumber">*Phone Number:</label>
        <input type="number" id="phonenumber" name="phonenumber">
        </div>
        </div>
        <div class="rowt">
        <div class="box">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
        </div>
        <div class="box">
        <label for="cnfrmpassword">Confirm Password:</label>
        <input type="password" id="cnfrmpassword" name="cnfrmpassword">
        </div>
    </fieldset>
    <input type="submit" value="Submit">
    </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
